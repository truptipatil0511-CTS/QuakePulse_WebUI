<div class="map-wrapper" role="main" aria-label="Earthquake map">

  <!-- Loading overlay -->
  <div class="map-loading" *ngIf="loading$ | async" role="status" aria-live="polite">
    <div class="spinner"></div>
    <span>Loading earthquakes…</span>
  </div>

  <!-- Initialisation error (rare — bad tile URL, offline, etc.) -->
  <div class="map-init-error" *ngIf="initError" role="alert">
    <div class="init-error-card">
      <div class="init-error-icon" aria-hidden="true">⚠️</div>
      <h2>Map failed to load</h2>
      <p>{{ initError }}</p>
      <p class="init-error-sub">Check your network connection and refresh the page.</p>
    </div>
  </div>

  <!-- Map container — fills wrapper, MapLibre auto-resizes via ResizeObserver -->
  <div #mapContainer class="map-container"
       role="application"
       tabindex="0"
       aria-label="Interactive earthquake map. Use arrow keys to pan, plus and minus to zoom."></div>

  <!-- Zoom controls (top-left, floating) -->
  <div class="map-controls map-controls--zoom" *ngIf="mapReady" role="group" aria-label="Zoom controls">
    <button class="map-ctrl-btn" (click)="zoomIn()" aria-label="Zoom in">+</button>
    <button class="map-ctrl-btn" (click)="fitToData()" title="Fit to data" aria-label="Fit map to visible earthquakes">⊡</button>
    <button class="map-ctrl-btn" (click)="zoomOut()" aria-label="Zoom out">−</button>
  </div>

  <!-- Style + heatmap controls (bottom-left, floating) -->
  <div class="map-controls map-controls--style" *ngIf="mapReady" role="group" aria-label="Map style controls">
    <button class="map-style-btn" [class.active]="selectedStyle === 'road'"
            (click)="setMapStyle('road')"
            [attr.aria-pressed]="selectedStyle === 'road'">
      🗺 Standard
    </button>
    <button class="map-style-btn" [class.active]="selectedStyle === 'night'"
            (click)="setMapStyle('night')"
            [attr.aria-pressed]="selectedStyle === 'night'">
      🌑 Dark
    </button>
    <button class="map-style-btn" [class.active]="selectedStyle === 'satellite_road_labels'"
            (click)="setMapStyle('satellite_road_labels')"
            [attr.aria-pressed]="selectedStyle === 'satellite_road_labels'">
      🛰 Satellite
    </button>
    <button class="map-style-btn heatmap-btn" [class.active]="heatmapEnabled"
            (click)="toggleHeatmap()"
            [attr.aria-pressed]="heatmapEnabled">
      🔥 Heatmap
    </button>
  </div>

  <!-- Heatmap legend (only while heatmap is on) — explains the dual encoding:
       hue = magnitude category, light→dark = event density. -->
  <div class="map-heatmap-legend" *ngIf="mapReady && heatmapEnabled"
       role="note" aria-label="Heatmap legend">
    <div class="hl-title">Heatmap key</div>
    <p class="hl-sub"><strong>Colour</strong> = magnitude · <strong>shade</strong> = density</p>
    <ul class="hl-bands" role="list">
      <li><span class="hl-swatch minor" aria-hidden="true"></span><span class="hl-label">&lt; 3.0 Minor</span></li>
      <li><span class="hl-swatch moderate" aria-hidden="true"></span><span class="hl-label">3.0–4.9 Moderate</span></li>
      <li><span class="hl-swatch strong" aria-hidden="true"></span><span class="hl-label">5.0–6.9 Strong</span></li>
      <li><span class="hl-swatch major" aria-hidden="true"></span><span class="hl-label">≥ 7.0 Major</span></li>
    </ul>
    <div class="hl-density" aria-hidden="true">
      <span class="hl-density-label">low</span>
      <span class="hl-density-bar"></span>
      <span class="hl-density-label">high density</span>
    </div>
  </div>

</div>

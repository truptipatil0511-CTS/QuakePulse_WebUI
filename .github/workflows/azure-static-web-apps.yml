name: Deploy QuakePulse WebUI to Azure Static Web Apps

# Deploys to the existing Static Web App "swa-prod-cin-01".
# - push to main      → deploys to production
# - pull request       → creates/updates a preview environment
# - PR closed          → tears the preview down

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # We build above ourselves (reliable Node version), so skip the
          # action's built-in Oryx build and just upload the compiled output.
          skip_app_build: true
          app_location: "dist/QuakePulseWebUI/browser"  # Angular build output
          api_location: ""                               # backend is hosted separately
          output_location: ""                            # already pointing at built files

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview environment
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
